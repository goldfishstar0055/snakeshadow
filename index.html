<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヘビ日陰マップ</title>
  <meta name="theme-color" content="#2BC5D4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ヘビ日陰マップ" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="viewDiv"></div>

  <!-- 右上情報パネル（折りたたみ可） -->
  <div id="info-panel" class="collapsed">
    <div id="info-header">
      <span id="info-summary">ヘビ日陰マップ</span>
      <span id="info-header-meta">
        <span id="info-date-badge"></span>
        <span id="info-weather-badge">⏳</span>
      </span>
      <button id="info-toggle" title="開く/閉じる">
        <svg id="info-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div id="info-body">
      <div id="location-status">位置情報を取得中…</div>
      <div id="weather-status">天気を取得中…</div>
      <div id="shadow-status">影の状態を確認中…</div>
      <div id="mode-status"></div>
      <div id="snake-count">ヘビデータ読込中…</div>
      <div id="snake-updated"></div>
      <button id="btn-reload-data" title="データを再取得">🔄 データ再読み込み</button>
    </div>
  </div>

  <!-- 目撃情報サイドパネル（デスクトップ：左固定 / モバイル：下ドロワー） -->
  <div id="sightings-panel">
    <div id="sightings-panel-header">
      <span id="sightings-title">📍 最近の目撃情報</span>
      <button id="sightings-close" title="閉じる">✕</button>
    </div>
    <div id="filter-buttons">
      <button class="filter-btn active" data-filter="all">全期間</button>
      <button class="filter-btn" data-filter="1m">1ヶ月</button>
      <button class="filter-btn" data-filter="3m">3ヶ月</button>
      <button class="filter-btn" data-filter="1y">1年</button>
    </div>
    <div id="sightings-list"><p class="no-sightings">読み込み中…</p></div>
  </div>

  <!-- モバイル：ドロワー開閉ボタン -->
  <button id="btn-sightings-toggle" title="目撃情報リスト">📍 目撃リスト</button>

  <div id="toolbar">
    <button id="btn-locate" title="現在地に移動">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      現在地
    </button>
    <button id="btn-top" title="真上から見る">真上</button>
    <button id="btn-angle" class="active" title="斜めから見る">斜め</button>
  </div>

  <div id="zoom-buttons">
    <button id="btn-zoom-in" title="ズームイン">＋</button>
    <button id="btn-zoom-out" title="ズームアウト">−</button>
  </div>

  <!-- 報告ボタン -->
  <button id="btn-report">🐍 目撃を報告</button>

  <!-- 報告モード中のバナー -->
  <div id="report-banner" class="hidden">
    <span>📍 地図上で目撃した場所をタップしてください</span>
    <button id="report-cancel">キャンセル</button>
  </div>

  <!-- 報告確認ダイアログ -->
  <div id="report-confirm" class="hidden">
    <p>この地点でヘビ目撃を報告しますか？</p>
    <p id="report-coords"></p>
    <div class="report-confirm-btns">
      <button id="report-submit">この地点で報告</button>
      <button id="report-back">やり直す</button>
    </div>
    <p class="report-note">Googleフォームが開きます。送信後、反映には時間がかかる場合があります。</p>
  </div>

  <!-- モード切替 -->
  <div id="mode-toggle">
    <button id="mode-realtime" class="active">リアルタイム</button>
    <button id="mode-preview">プレビュー</button>
  </div>

  <!-- プレビューパネル -->
  <div id="preview-panel" class="hidden">
    <div id="preview-header">
      <div id="preview-tabs">
        <button class="preview-tab active" data-tab="sun">日光</button>
        <button class="preview-tab" data-tab="weather">天気</button>
      </div>
      <button id="preview-close" title="閉じる">✕</button>
    </div>
    <div id="preview-body">
      <div id="tab-sun" class="tab-content active">
        <label class="pv-label">
          時刻
          <span id="pv-time-display">12:00 JST</span>
        </label>
        <div class="pv-slider-row">
          <input type="range" id="pv-time-slider" min="0" max="1440" value="720" step="1" />
          <button id="pv-play" title="再生/停止">▶</button>
        </div>
        <label class="pv-label">日付</label>
        <input type="date" id="pv-date-picker" />
      </div>
      <div id="tab-weather" class="tab-content">
        <label class="pv-label">天気</label>
        <div id="pv-weather-icons">
          <button class="weather-btn active" data-weather="sunny" title="晴れ">☀️</button>
          <button class="weather-btn" data-weather="cloudy" title="曇り">☁️</button>
          <button class="weather-btn" data-weather="rainy" title="雨">🌧️</button>
          <button class="weather-btn" data-weather="snowy" title="雪">❄️</button>
          <button class="weather-btn" data-weather="foggy" title="霧">🌫️</button>
        </div>
        <label class="pv-label">
          雲量
          <span id="pv-cloud-display">30%</span>
        </label>
        <input type="range" id="pv-cloud-slider" min="0" max="100" value="30" step="1" />
      </div>
    </div>
  </div>

  <div id="notification" class="hidden"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
