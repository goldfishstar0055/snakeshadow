<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ヘビ日陰マップ</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="viewDiv"></div>
  <div id="info-panel">
    <h3>ヘビ日陰マップ</h3>
    <div id="location-status">位置情報を取得中…</div>
    <div id="weather-status">天気を取得中…</div>
    <div id="shadow-status">影の状態を確認中…</div>
    <div id="snake-count">ヘビデータ読込中…</div>
  </div>
  <div id="toolbar">
    <button id="btn-locate" title="現在地に移動">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      現在地
    </button>
    <button id="btn-top" title="真上から見る">真上</button>
    <button id="btn-angle" class="active" title="斜めから見る">斜め</button>
  </div>
  <div id="zoom-buttons">
    <button id="btn-zoom-in" title="ズームイン">＋</button>
    <button id="btn-zoom-out" title="ズームアウト">−</button>
  </div>
  <div id="notification" class="hidden"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
